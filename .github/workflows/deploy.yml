name: Deploy

on:
  push:
    branches: [master]
    paths:
      - "app/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

# Required for Workload Identity Federation
permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  AR_REPO: ${{ vars.AR_REPO }}           # e.g. us-central1-docker.pkg.dev/project/iron-counsel
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
  WIF_PROVIDER: ${{ vars.WIF_PROVIDER }} # from terraform output workload_identity_provider
  DEPLOY_SA: ${{ vars.DEPLOY_SA }}       # from terraform output deploy_service_account

jobs:
  # ── Job 1: Run tests (gate) ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest --tb=short -q

  # ── Job 2: Build & push Docker image ────────────────────────────────────
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        id: image
        run: |
          IMAGE="${AR_REPO}/iron-counsel:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  # ── Job 3: Deploy to Cloud Run ──────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ needs.build-push.outputs.image }}

      - name: Show deployed URL
        run: echo "Deployed to $(gcloud run services describe $CLOUD_RUN_SERVICE --region=$GCP_REGION --format='value(status.url)')"
